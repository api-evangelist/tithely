meters:
- name: card_transaction_fee
  description: Percentage + fixed fee on each card donation (~2.9% + $0.30).
  unit: transactions
  aggregation: sum
  dimensions:
  - organization
  - payment_category
- name: ach_transaction_fee
  description: Percentage + fixed fee on each ACH donation (~1% + $0.30).
  unit: transactions
  aggregation: sum
  dimensions:
  - organization
  - payment_category
- name: amex_transaction_fee
  description: Percentage + fixed fee on each American Express donation (~3.5% + $0.30).
  unit: transactions
  aggregation: sum
  dimensions:
  - organization
  - payment_category
- name: software_subscription
  description: Fixed monthly subscription for ChMS / All-Access bundles.
  unit: months
  aggregation: sum
  dimensions:
  - organization
  - plan
principles:
- name: Visibility
  description: Track processing fees per organization and giving fund, separating card, ACH, and Amex mix, plus fixed monthly subscription cost.
- name: Allocation
  description: Attribute fees to funds (payment categories) and ministries so giving cost maps to programs.
- name: Optimization
  description: Encourage ACH over card where possible (lower fee), enable donor fee coverage, and right-size the software bundle to what is actually used.
- name: Accountability
  description: Assign an owner to review monthly processing fees and subscription spend against giving volume and budget.
