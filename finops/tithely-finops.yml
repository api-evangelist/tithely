description: >-
  FinOps view of Tithe.ly spend. Tithe.ly is a payment-facilitator and
  church-technology platform, so cost is driven primarily by per-donation
  processing fees (percentage + fixed per transaction, varying by card / ACH /
  Amex) rather than by API call volume. On top of processing, optional monthly
  software subscriptions (church management, branded app, website, worship tools)
  add fixed recurring cost. The developer API itself carries no separate metered
  price. A distinctive lever is donor fee coverage - a large share of donors opt
  to cover the processing fee, which materially reduces the church's net cost.
notes: >-
  Per-unit processing rates and subscription prices are those publicly reported
  as of the review date; reconcile against get.tithe.ly/pricing. The dominant
  cost driver for API integrators is transaction processing fees on giving
  volume, not API usage.
sources:
