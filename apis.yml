aid: tithely
url: https://raw.githubusercontent.com/api-evangelist/tithely/refs/heads/main/apis.yml
name: Tithe.ly
kind: company
description: Tithe.ly is a church technology platform for online and mobile giving,
  church management (ChMS), branded church apps, websites, events, and messaging.
  Its developer API lets churches and approved partners create donations, tokenize
  cards and bank accounts for PCI-safe payments, charge one-time and recurring gifts,
  manage giving funds (payment categories), and look up organizations. API access is
  gated - it is granted by request to organizations that use (or are moving to)
  Tithe.ly, and approved requesters receive public and private API keys by email.
  There are two documented generations - a V1 payments/tokenization API (Tithely.js
  plus charge endpoints) and a V2 REST API (organizations, transactions, funds, and
  mail).
